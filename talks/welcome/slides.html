<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: 'Roboto', sans-serif;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      cursor: default;
    }

    .slide {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6vw 10vw;
    }

    h1 {
      font-size: 5vw;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 5vh;
    }

    ul {
      list-style: none;
    }

    /* Standalone image (not bullet, not aside) */
    .slide > img {
      max-height: 45vh;
      max-width: 100%;
      object-fit: contain;
      margin-bottom: 4vh;
    }

    /* Image aside layout */
    .slide.has-aside {
      flex-direction: row;
      padding: 0;
      align-items: stretch;
    }

    .slide.has-aside .content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6vw 4vw 6vw 10vw;
    }

    .aside-img {
      height: 100vh;
      width: auto;
      display: block;
      flex-shrink: 0;
    }

    /* Bullet image */
    li.bullet-img {
      line-height: 1;
    }

    li.bullet-img img {
      max-height: 30vh;
      max-width: 70%;
      object-fit: contain;
      display: block;
    }

    li {
      font-size: 3vw;
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 0.4em;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    li.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .counter {
      position: fixed;
      bottom: 2.5vh;
      right: 3vw;
      font-size: 1rem;
      font-weight: 300;
      opacity: 0.25;
      letter-spacing: 0.05em;
    }

    .error {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-weight: 300;
      color: #666;
      font-size: 1.1rem;
      text-align: center;
      padding: 3rem;
      line-height: 1.8;
    }

    .error code {
      background: #1a1a1a;
      padding: 0.4em 0.9em;
      border-radius: 4px;
      font-family: 'Roboto Mono', 'Courier New', monospace;
      color: #999;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
  let slides = [];
  let slideIdx = 0;
  let bulletIdx = 0;

  function parseMarkdown(md) {
    const rawBlocks = md.split(/\n---\n/).map(b => b.trim()).filter(Boolean);
    const result = [];
    let frontmatter = {};

    for (const block of rawBlocks) {
      const lines = block.split('\n');
      const hasHeading = lines.some(l => l.startsWith('# '));

      if (!hasHeading) {
        // Frontmatter block — collect key: value pairs for the next slide
        for (const line of lines) {
          const m = line.match(/^([\w_]+)\s*:\s*(.+)$/);
          if (m) frontmatter[m[1]] = m[2].trim();
        }
        continue;
      }

      const titleLine = lines.find(l => l.startsWith('# '));
      const title = titleLine ? titleLine.slice(2).trim() : 'Slide';

      const bullets = [];
      const images = [];

      for (const line of lines) {
        if (line.startsWith('- ')) {
          const rest = line.slice(2).trim();
          const img = rest.match(/^!\[(.*?)\]\((.+?)\)$/);
          if (img) {
            bullets.push({ type: 'image', alt: img[1], src: img[2] });
          } else {
            bullets.push({ type: 'text', text: rest });
          }
        } else if (/^!\[.*\]\(.+\)/.test(line)) {
          const m = line.match(/^!\[(.*?)\]\((.+?)\)/);
          if (m) images.push({ alt: m[1], src: m[2] });
        }
      }

      result.push({ title, bullets, images, imageAside: frontmatter.image_aside || null });
      frontmatter = {};
    }

    return result;
  }

  function render() {
    const slide = slides[slideIdx];
    document.title = slide.title;

    const bulletsHtml = slide.bullets.map((b, i) => {
      const vis = i < bulletIdx ? ' visible' : '';
      if (b.type === 'image') {
        return '<li class="bullet-img' + vis + '"><img src="' + b.src + '" alt="' + b.alt + '"></li>';
      }
      return '<li class="' + vis.trim() + '">' + b.text + '</li>';
    }).join('');

    const standaloneImgs = slide.images
      .map(img => '<img src="' + img.src + '" alt="' + img.alt + '">')
      .join('');

    const counter = '<div class="counter">' + (slideIdx + 1) + ' / ' + slides.length + '</div>';

    if (slide.imageAside) {
      document.getElementById('app').innerHTML =
        '<div class="slide has-aside">' +
          '<div class="content">' +
            '<h1>' + slide.title + '</h1>' +
            standaloneImgs +
            '<ul>' + bulletsHtml + '</ul>' +
          '</div>' +
          '<img class="aside-img" src="' + slide.imageAside + '" alt="">' +
        '</div>' + counter;
    } else {
      document.getElementById('app').innerHTML =
        '<div class="slide">' +
          '<h1>' + slide.title + '</h1>' +
          standaloneImgs +
          '<ul>' + bulletsHtml + '</ul>' +
        '</div>' + counter;
    }
  }

  function showError(html) {
    document.getElementById('app').innerHTML = '<div class="error">' + html + '</div>';
  }

  function advance() {
    const slide = slides[slideIdx];
    if (bulletIdx < slide.bullets.length) {
      bulletIdx++;
    } else if (slideIdx < slides.length - 1) {
      slideIdx++;
      bulletIdx = 0;
    }
    render();
  }

  function retreat() {
    if (bulletIdx > 0) {
      bulletIdx--;
    } else if (slideIdx > 0) {
      slideIdx--;
      bulletIdx = slides[slideIdx].bullets.length;
    }
    render();
  }

  document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      advance();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      retreat();
    }
  });

  fetch('slides.md')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(md => {
      slides = parseMarkdown(md);
      if (!slides.length) {
        showError('<p>No slides found in <code>slides.md</code></p>');
        return;
      }
      render();
    })
    .catch(() => {
      showError(
        '<p>Could not load <code>slides.md</code></p>' +
        '<p>Serve this folder with a local server, e.g.</p>' +
        '<code>python3 -m http.server</code>'
      );
    });
</script>
</body>
</html>
